name: Generate GitBlog README

on:
  workflow_dispatch:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened, closed]
  issue_comment:
    types: [created, edited]
  push:
    branches:
      - main
    paths:
      - main.py
      - scripts/generate_full_issue_pages.py
      - .github/workflows/generate_readme.yml

jobs:
  sync:
    name: Generate README
    runs-on: ubuntu-latest
    if: github.repository_owner_id == github.event.issue.user.id || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Generate new md
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source venv/bin/activate
          python main.py ${{ secrets.G_T }} ${{ github.repository }} --issue_number '${{ github.event.issue.number }}'
          python scripts/generate_full_issue_pages.py --user ${{ github.repository_owner }} --repo ${{ github.event.repository.name }} --output output/content --static-output .

      - name: Push README
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md feed.xml index.html BACKUP/*.md issue-*/index.html
          git commit -m 'update blog index' || echo "nothing to commit"
          git push || echo "nothing to push"
