{% extends "base.html" %}

{% block title %}Tags · {{ config.title }}{% endblock title %}

{% block content %}
<section class="archive-page">
  <div class="archive-heading">
    <p class="eyebrow">Tags</p>
    <h1>标签</h1>
    <p class="archive-summary">{{ terms | length }} 个标签</p>
  </div>
  <ol class="tag-list">
    {% for term in terms %}
      <li>
        <a href="{{ term.permalink }}">
          <span class="tag-list-number" aria-hidden="true"></span>
          <span class="tag-list-name">{{ term.name }}</span>
          <span class="tag-list-count">{{ term.pages | length }} 篇</span>
        </a>
      </li>
    {% endfor %}
  </ol>
</section>
{% endblock content %}
